apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openldap-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openldap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openldap
  template:
    metadata:
      labels:
        app: openldap
    spec:
      containers:
        - name: openldap
          image: osixia/openldap:1.5.0
          args: ["--copy-service"]
          env:
            - name: LDAP_ORGANISATION
              value: "Example Inc."
            - name: LDAP_DOMAIN
              value: "example.org"
            - name: LDAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openldap-credentials
                  key: adminPassword
            - name: LDAP_TLS
              value: "true"
            - name: LDAP_TLS_CRT_FILENAME
              value: "tls.crt"
            - name: LDAP_TLS_KEY_FILENAME
              value: "tls.key"
            - name: LDAP_TLS_CA_CRT_FILENAME
              value: "ca.crt"
            - name: LDAP_TLS_ENFORCE
              value: "true"
            - name: LDAP_TLS_VERIFY_CLIENT
              value: "never"
            - name: LDAP_REMOVE_CONFIG_AFTER_SETUP
              value: "true"
          ports:
            - containerPort: 389
              name: ldap
            - containerPort: 636
              name: ldaps
          volumeMounts:
            - name: data
              mountPath: /var/lib/ldap
            - name: config
              mountPath: /etc/ldap/slapd.d
            - name: certs
              mountPath: /container/service/slapd/assets/certs
            - name: bootstrap-ldif
              mountPath: /container/service/slapd/assets/config/bootstrap/ldif/custom
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openldap-data
        - name: config
          emptyDir: {}
        - name: certs
          secret:
            secretName: openldap-tls
        - name: bootstrap-ldif
          configMap:
            name: openldap-bootstrap-ldif
---
apiVersion: v1
kind: Service
metadata:
  name: openldap
spec:
  selector:
    app: openldap
  ports:
    - name: ldap
      port: 389
      targetPort: 389
    - name: ldaps
      port: 636
      targetPort: 636