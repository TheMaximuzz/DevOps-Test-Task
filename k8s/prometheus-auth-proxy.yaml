apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-auth-proxy-conf
data:
  nginx.conf: |
    events {}
    http {
      server {
        listen 8080;
        location / {
          auth_basic "Prometheus";
          auth_basic_user_file /etc/nginx/auth/htpasswd.txt;
          proxy_pass http://kube-prometheus-stack-prometheus:9090;
          proxy_set_header Host $host;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-auth-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-auth-proxy
  template:
    metadata:
      labels:
        app: prometheus-auth-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: htpasswd
              mountPath: /etc/nginx/auth
      volumes:
        - name: nginx-conf
          configMap:
            name: prometheus-auth-proxy-conf
        - name: htpasswd
          secret:
            secretName: prometheus-nginx-htpasswd
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-authenticated
spec:
  selector:
    app: prometheus-auth-proxy
  ports:
    - port: 8080
      targetPort: 8080
